global:
  scrape_timeout_offset: 500ms

target:
  data_source_name: 'postgresql://monitor:monitorpass@postgres:5432/monitoring?sslmode=disable'

  collectors:
    - host_info
    - package_stats
    - vulnerabilites_table
    - vulnerabilities_count

collectors:

  - collector_name: host_info

    metrics:
      - metric_name: host_last_scan

        type: gauge

        help: "Последнее сканирование ОС"

        values:
          - last_scan

        key_labels:
          - hostname
          - os_name
          - kernel_version

        query: |
          SELECT
            hostname,
            os_name,
            kernel_version,
            EXTRACT(EPOCH FROM MAX(collected_at)) AS last_scan
          FROM hosts h
          JOIN scans s ON h.id = s.host_id
          GROUP BY hostname, os_name, kernel_version;

  - collector_name: package_stats

    metrics:
      - metric_name: installed_packages_total

        type: gauge

        help: "Количество установленных пакетов"

        values:
          - package_count

        key_labels:
          - hostname

        query: |
          SELECT
            h.hostname,
            s.package_count
          FROM scans s
          JOIN hosts h ON h.id = s.host_id
          ORDER BY s.collected_at DESC
          LIMIT 1;
  - collector_name: vulnerabilities_table

    metrics:
      - metric_name: vulnerabilities_info

        type: gauge

        help: "Current vulnerabilities"

        values:
          - value

        key_labels:
          - vuln_id
          - severity
          - package_name
          - package_version

        query: |
          SELECT
            v.vuln_id,
            v.severity,
            vs.package_name,
            vs.package_version,
            1 AS value
          FROM vulnerability_scans vs
          JOIN vulnerability v
            ON vs.vulnerability_id = v.id;

  - collector_name: vulnerabilities_count

    metrics:
      - metric_name: vulnerabilities_total

        type: gauge

        help: "Aggregated vulnerabilities count"

        values:
          - vuln_count

        key_labels:
          - severity

        query: |
          SELECT
            v.severity,
            COUNT(*) AS vuln_count
          FROM vulnerability_scans vs
          JOIN vulnerability v
            ON vs.vulnerability_id = v.id
          GROUP BY v.severity